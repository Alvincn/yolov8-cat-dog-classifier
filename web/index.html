<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>猫狗分类</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: #17202a;
        background: #f4f7f5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(135deg, rgba(42, 101, 89, 0.12), transparent 34%),
          linear-gradient(315deg, rgba(210, 82, 70, 0.1), transparent 30%),
          #f4f7f5;
      }

      main {
        width: min(960px, calc(100% - 32px));
        margin: 0 auto;
        padding: 48px 0;
      }

      header {
        margin-bottom: 28px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 34px;
        font-weight: 760;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: #53615d;
        line-height: 1.6;
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 320px;
        gap: 20px;
        align-items: start;
      }

      .panel {
        border: 1px solid #d9e2dd;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 12px 32px rgba(35, 45, 41, 0.08);
      }

      .uploader {
        min-height: 430px;
        padding: 20px;
      }

      .dropzone {
        position: relative;
        display: grid;
        min-height: 300px;
        place-items: center;
        overflow: hidden;
        border: 1px dashed #9cb2aa;
        border-radius: 8px;
        background: #f9fbfa;
      }

      .dropzone input {
        position: absolute;
        inset: 0;
        cursor: pointer;
        opacity: 0;
      }

      .empty {
        padding: 28px;
        text-align: center;
      }

      .empty strong {
        display: block;
        margin-bottom: 6px;
        color: #25352f;
        font-size: 18px;
      }

      #preview {
        display: none;
        width: 100%;
        max-height: 420px;
        object-fit: contain;
      }

      .actions {
        display: flex;
        gap: 12px;
        margin-top: 16px;
      }

      button {
        min-height: 42px;
        border: 0;
        border-radius: 8px;
        padding: 0 18px;
        background: #255f52;
        color: #fff;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
        background: #9aa8a3;
      }

      .result {
        padding: 20px;
      }

      .result h2 {
        margin: 0 0 18px;
        font-size: 18px;
      }

      .label {
        display: block;
        margin-bottom: 8px;
        color: #53615d;
        font-size: 13px;
      }

      .answer {
        margin-bottom: 18px;
        font-size: 44px;
        font-weight: 800;
        line-height: 1;
      }

      .metric {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 0;
        border-top: 1px solid #edf1ef;
      }

      .metric span:last-child {
        color: #17202a;
        font-weight: 700;
      }

      .message {
        margin-top: 16px;
        color: #9b2f29;
        line-height: 1.5;
      }

      @media (max-width: 760px) {
        main {
          width: min(100% - 24px, 960px);
          padding: 28px 0;
        }

        h1 {
          font-size: 28px;
        }

        .workspace {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>猫狗分类</h1>
        <p>上传一张图片，模型会判断它更像猫还是狗。</p>
      </header>

      <section class="workspace">
        <div class="panel uploader">
          <label class="dropzone">
            <input id="imageInput" type="file" accept="image/*" />
            <img id="preview" alt="上传的图片预览" />
            <span class="empty" id="emptyState">
              <strong>选择图片</strong>
              <span>支持 jpg、png、webp 等常见图片格式</span>
            </span>
          </label>
          <div class="actions">
            <button id="predictButton" type="button" disabled>开始判断</button>
          </div>
          <p class="message" id="message"></p>
        </div>

        <aside class="panel result">
          <h2>识别结果</h2>
          <span class="label">判断</span>
          <div class="answer" id="answer">-</div>
          <div class="metric">
            <span>模型类别</span>
            <span id="className">-</span>
          </div>
          <div class="metric">
            <span>置信度</span>
            <span id="confidence">-</span>
          </div>
        </aside>
      </section>
    </main>

    <script>
      const input = document.querySelector("#imageInput");
      const preview = document.querySelector("#preview");
      const emptyState = document.querySelector("#emptyState");
      const button = document.querySelector("#predictButton");
      const message = document.querySelector("#message");
      const answer = document.querySelector("#answer");
      const className = document.querySelector("#className");
      const confidence = document.querySelector("#confidence");

      let selectedFile = null;

      input.addEventListener("change", () => {
        selectedFile = input.files[0] || null;
        message.textContent = "";
        button.disabled = !selectedFile;
        answer.textContent = "-";
        className.textContent = "-";
        confidence.textContent = "-";

        if (!selectedFile) {
          preview.style.display = "none";
          emptyState.style.display = "block";
          preview.removeAttribute("src");
          return;
        }

        preview.src = URL.createObjectURL(selectedFile);
        preview.style.display = "block";
        emptyState.style.display = "none";
      });

      button.addEventListener("click", async () => {
        if (!selectedFile) {
          message.textContent = "请先选择一张图片。";
          return;
        }

        button.disabled = true;
        button.textContent = "判断中...";
        message.textContent = "";

        const formData = new FormData();
        formData.append("image", selectedFile);

        try {
          const response = await fetch("/predict", {
            method: "POST",
            body: formData,
          });
          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.error || "预测失败");
          }

          answer.textContent = data.label;
          className.textContent = data.class_name;
          confidence.textContent = `${(data.confidence * 100).toFixed(2)}%`;
        } catch (error) {
          message.textContent = error.message;
        } finally {
          button.disabled = false;
          button.textContent = "开始判断";
        }
      });
    </script>
  </body>
</html>
